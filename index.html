<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wild Game Soundboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        #login-screen, #app-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .header {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-weight: bold;
            color: #1DB954;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex-grow: 1;
        }
        button {
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.96);
            opacity: 0.8;
        }
        .btn-full {
            grid-column: span 2;
            background-color: #1DB954;
            padding: 25px;
            margin-bottom: 12px;
        }
        .btn-grid {
            background-color: #333;
            padding: 20px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .btn-stop {
            grid-column: span 2;
            background-color: #e02424;
            padding: 35px;
            font-size: 1.8rem;
            margin-top: 15px;
            text-transform: uppercase;
        }
        .btn-login {
            background-color: #1DB954;
            padding: 20px;
            margin: auto;
            border-radius: 50px;
            width: 80%;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <button class="btn-login" onclick="login()">Connect to Spotify</button>
    </div>

    <div id="app-screen">
        <div class="header">Game Soundboard</div>
        
        <button class="btn-full" onclick="playRandomTrack('pregame')">
            Pregame Announcement
        </button>

        <div class="grid">
            <button class="btn-grid" onclick="playRandomTrack('whistles')">Between Whistles</button>
            <button class="btn-grid" onclick="playRandomTrack('goalFor')">Goal FOR</button>
            
            <button class="btn-grid" onclick="playRandomTrack('goalAgainst')">Goal AGAINST</button>
            <button class="btn-grid" onclick="playRandomTrack('penaltyFor')">Penalty FOR</button>
            
            <button class="btn-grid" onclick="playRandomTrack('penaltyAgainst')">Penalty AGAINST</button>
            <button class="btn-grid" onclick="playRandomTrack('endGame')">End Game Intensity</button>
        </div>

        <button class="btn-stop" onclick="stopMusic()">🛑 STOP MUSIC</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CLIENT_ID = 'YOUR_CLIENT_ID_HERE'; // Paste your Client ID here
        
        // Auto-detects if you are on localhost or GitHub Pages
        const REDIRECT_URI = window.location.origin + window.location.pathname; 
        
        let accessToken = null;

        // --- TRACK ARRAYS (Right-click a song in Spotify -> Share -> Copy Spotify URI) ---
        const tracks = {
            pregame: [
                'spotify:track:0tZ3mElWcr74OOhKEiNj8V', // Placeholder: RATM
                'spotify:track:3cuNcsSWeYJ1LwI22z6QnS'  // Placeholder: Mastodon
            ],
            whistles: [
                'spotify:track:51c94ac31swyEAyWHyOtz',  // Placeholder: Fast Punk Track
                'spotify:track:1Eolhana7nKGWwIGvmihxX'  // Placeholder: Radiohead
            ],
            goalFor: [
                'spotify:track:2d7LPtieXdIYZEvugvOjl1'  // Placeholder: High Energy/Explosive
            ],
            goalAgainst: [
                'spotify:track:3hB3sGhU2qJ1BEn9JjP2Hq'  // Placeholder: Somber/Heavy
            ],
            penaltyFor: [
                'spotify:track:0ofHAoxe9vBkTCp2UQIavz'  // Placeholder: Gojira (Hype)
            ],
            penaltyAgainst: [
                'spotify:track:0ofHAoxe9vBkTCp2UQIavz'  // Placeholder: Tense Opeth riff
            ],
            endGame: [
                'spotify:track:0ofHAoxe9vBkTCp2UQIavz'  // Placeholder: Epic Prog Rock closer
            ]
        };

        // --- AUTHENTICATION ---
        function checkToken() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            accessToken = params.get('access_token');

            if (accessToken) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                window.history.pushState("", document.title, window.location.pathname);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        }

        function login() {
            const scope = 'user-modify-playback-state user-read-playback-state';
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scope)}`;
            window.location.href = authUrl;
        }

        // --- PLAYBACK CONTROLS ---
        async function playRandomTrack(category) {
            if (!accessToken) return alert("Please log in first!");

            const categoryTracks = tracks[category];
            if (!categoryTracks || categoryTracks.length === 0) return;

            // Pick a random track from the array
            const randomUri = categoryTracks[Math.floor(Math.random() * categoryTracks.length)];

            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/play', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ uris: [randomUri] })
                });

                if (response.status === 404) {
                    alert("No active Spotify device found. Open Spotify on your phone and press play once to activate it.");
                }
            } catch (error) {
                console.error("Error playing track:", error);
            }
        }

        async function stopMusic() {
            if (!accessToken) return;
            
            try {
                await fetch('https://api.spotify.com/v1/me/player/pause', {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
            } catch (error) {
                console.error("Error pausing track:", error);
            }
        }

        // Initialize
        checkToken();
    </script>
</body>
</html>
