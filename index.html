<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Soundboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            gap: 8px;
        }
        #login-screen, #app-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            gap: 8px;
        }
        .header {
            text-align: center;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            font-weight: bold;
            color: #1DB954;
            flex-shrink: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex-grow: 0;
            flex-shrink: 1;
            min-height: 0;
        }
        button {
            border: none;
            border-radius: 12px;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            font-weight: bold;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.96);
            opacity: 0.8;
        }
        .btn-full {
            grid-column: span 2;
            background-color: #1DB954;
            padding: clamp(12px, 3vh, 25px);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-grid {
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 0;
            max-height: 140px;
        }
        .now-playing {
            background-color: #1e3a8a;
            border-radius: 12px;
            padding: 12px 15px;
            flex-shrink: 0;
            transition: background-color 0.3s;
        }
        .now-playing.idle {
            background-color: #1e40af;
        }
        .now-playing.playing {
            background-color: #1e3a8a;
        }
        .now-playing-label {
            font-size: 0.85rem;
            color: #a5d6ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .now-playing-track {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: white;
            font-weight: 600;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-stop {
            grid-column: span 2;
            background-color: #e02424;
            padding: clamp(20px, 4vh, 40px);
            font-size: clamp(1.3rem, 3.5vw, 2rem);
            text-transform: uppercase;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: clamp(60px, 10vh, 100px);
        }
        .btn-login {
            background-color: #1DB954;
            padding: 20px;
            margin: auto;
            border-radius: 50px;
            width: 80%;
            font-size: 1.3rem;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background-color: #1a1a1a;
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            max-height: 70vh;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #333;
        }
        #modal-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #1DB954;
        }
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
        }
        .track-list {
            overflow-y: auto;
            padding: 10px;
            flex-grow: 1;
        }
        .track-item {
            background-color: #222;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .track-item:active {
            background-color: #1DB954;
            border-color: #1DB954;
            transform: scale(0.98);
        }
        .track-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .track-uri {
            font-size: 0.85rem;
            color: #999;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <button class="btn-login" onclick="login()">Connect to Spotify</button>
    </div>

    <div id="app-screen">
        <div class="header">Game Soundboard</div>

        <button class="btn-full" onclick="openTrackSelector('pregame', 'Pregame Announcement')">
            Pregame Announcement
        </button>

        <div class="grid">
            <button class="btn-grid" onclick="openTrackSelector('whistles', 'Between Whistles')">Between Whistles</button>
            <button class="btn-grid" onclick="openTrackSelector('goalFor', 'Goal FOR')">Goal FOR</button>

            <button class="btn-grid" onclick="openTrackSelector('goalAgainst', 'Goal AGAINST')">Goal AGAINST</button>
            <button class="btn-grid" onclick="openTrackSelector('penaltyFor', 'Penalty FOR')">Penalty FOR</button>

            <button class="btn-grid" onclick="openTrackSelector('penaltyAgainst', 'Penalty AGAINST')">Penalty AGAINST</button>
            <button class="btn-grid" onclick="openTrackSelector('endGame', 'End Game Intensity')">End Game Intensity</button>
        </div>

        <div id="now-playing" class="now-playing idle">
            <div class="now-playing-label">Now Playing</div>
            <div id="now-playing-track" class="now-playing-track">Nothing</div>
        </div>

        <button class="btn-stop" onclick="stopMusic()">🛑 STOP MUSIC</button>
    </div>

    <div id="track-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-title">Select Track</span>
                <button class="modal-close" onclick="closeTrackSelector()">✕</button>
            </div>
            <div id="track-list" class="track-list"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CLIENT_ID = "15f455ebb98944a596f984be56766ac0"; // Paste your Client ID here
        const REDIRECT_URI = window.location.origin + window.location.pathname; 
        
        let accessToken = localStorage.getItem('spotify_access_token');

        // --- TRACK ARRAYS ---
        const tracks = {
            pregame: [
                'spotify:track:0pqnGHJpmpxLKifKRmU6WP'
            ],
            whistles: [
                'spotify:track:51c94ac31swyEAyWHyOtz',  
                'spotify:track:1Eolhana7nKGWwIGvmihxX'  
            ],
            goalFor: [
                'spotify:track:2d7LPtieXdIYZEvugvOjl1'  
            ],
            goalAgainst: [
                'spotify:track:3hB3sGhU2qJ1BEn9JjP2Hq'  
            ],
            penaltyFor: [
                'spotify:track:0ofHAoxe9vBkTCp2UQIavz'  
            ],
            penaltyAgainst: [
                'spotify:track:0ofHAoxe9vBkTCp2UQIavz'  
            ],
            endGame: [
                'spotify:track:0ofHAoxe9vBkTCp2UQIavz'  
            ]
        };

        // --- PKCE AUTHENTICATION LOGIC ---
        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        }

        async function sha256(plain) {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        }

        function base64encode(input) {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '')
                .replace(/\+/g, '-')
                .replace(/\//g, '_');
        }

        async function login() {
            const codeVerifier = generateRandomString(64);
            window.localStorage.setItem('code_verifier', codeVerifier);
            const hashed = await sha256(codeVerifier);
            const codeChallenge = base64encode(hashed);

            const scope = 'user-modify-playback-state user-read-playback-state';
            const authUrl = new URL("https://accounts.spotify.com/authorize");
            
            const params = {
                response_type: 'code',
                client_id: CLIENT_ID,
                scope: scope,
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
                redirect_uri: REDIRECT_URI,
            };

            authUrl.search = new URLSearchParams(params).toString();
            window.location.href = authUrl.toString();
        }

        async function getToken(code) {
            const codeVerifier = localStorage.getItem('code_verifier');
            
            const payload = {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    client_id: CLIENT_ID,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    code_verifier: codeVerifier,
                })
            };

            try {
                const body = await fetch("https://accounts.spotify.com/api/token", payload);
                const response = await body.json();

                if (response.access_token) {
                    localStorage.setItem('spotify_access_token', response.access_token);
                    accessToken = response.access_token;
                    window.history.replaceState({}, document.title, window.location.pathname);
                    showApp();
                } else {
                    alert("Authentication failed. Check your client ID and redirect URIs.");
                }
            } catch (err) {
                console.error("Token fetch error:", err);
            }
        }

        function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                // If returning from Spotify with a code, swap it for a token
                getToken(code);
            } else if (accessToken) {
                // If we already have a saved token
                showApp();
            } else {
                // First time load
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
        }

        // --- TRACK SELECTOR MODAL ---
        let currentCategory = null;

        function openTrackSelector(category, label) {
            if (!accessToken) return alert("Please log in first!");
            currentCategory = category;
            document.getElementById('modal-title').textContent = label;

            const trackList = document.getElementById('track-list');
            trackList.innerHTML = '';

            const categoryTracks = tracks[category] || [];
            categoryTracks.forEach((track, index) => {
                const uri = typeof track === 'string' ? track : track.uri;
                const name = typeof track === 'string' ? `Track ${index + 1}` : track.name;

                const item = document.createElement('div');
                item.className = 'track-item';
                item.innerHTML = `
                    <div class="track-name">${name}</div>
                    <div class="track-uri">${uri}</div>
                `;
                item.onclick = () => playTrack(uri, name);
                trackList.appendChild(item);
            });

            document.getElementById('track-modal').style.display = 'flex';
        }

        function closeTrackSelector() {
            document.getElementById('track-modal').style.display = 'none';
            currentCategory = null;
        }

        // --- PLAYBACK CONTROLS ---
        async function playTrack(uri, trackName) {
            if (!accessToken) return alert("Please log in first!");

            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/play', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ uris: [uri] })
                });

                if (response.status === 404) {
                    alert("No active Spotify device found. Open Spotify on your phone and press play once to activate it.");
                } else if (response.status === 401) {
                    // Token expired
                    localStorage.removeItem('spotify_access_token');
                    accessToken = null;
                    checkAuth();
                } else {
                    updateNowPlaying(trackName);
                    closeTrackSelector();
                }
            } catch (error) {
                console.error("Error playing track:", error);
            }
        }

        function updateNowPlaying(trackName) {
            const nowPlaying = document.getElementById('now-playing');
            document.getElementById('now-playing-track').textContent = trackName;
            nowPlaying.classList.remove('idle');
            nowPlaying.classList.add('playing');
        }

        async function stopMusic() {
            if (!accessToken) return;

            try {
                await fetch('https://api.spotify.com/v1/me/player/pause', {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                const nowPlaying = document.getElementById('now-playing');
                document.getElementById('now-playing-track').textContent = 'Nothing';
                nowPlaying.classList.remove('playing');
                nowPlaying.classList.add('idle');
            } catch (error) {
                console.error("Error pausing track:", error);
            }
        }

        // Initialize
        checkAuth();
    </script>
</body>
</html>
