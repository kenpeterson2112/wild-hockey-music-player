<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wild Soundboard</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 50% 0%, #1a2036 0%, #0d0f16 60%);
            color: white;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            gap: 8px;
        }
        #login-screen, #app-screen {
            flex-direction: column;
            height: 100%;
            min-height: 0;
            gap: 8px;
        }
        /* Login shows by DEFAULT so a JS failure never leaves a black screen */
        #login-screen { display: flex; }
        #app-screen { display: none; }

        /* --- Shared button base --- */
        button {
            border: none;
            border-radius: 14px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
            transition: transform 0.08s ease, filter 0.15s ease;
            font-family: inherit;
        }
        button:active {
            transform: scale(0.97);
            filter: brightness(1.15);
        }

        /* --- Pregame row --- */
        .pregame-row {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .btn-full {
            flex: 1 1 auto;
            background: linear-gradient(135deg, #1DB954 0%, #159a44 100%);
            padding: 16px;
            font-size: clamp(1rem, 3.2vw, 1.35rem);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: clamp(52px, 8vh, 74px);
            box-shadow: 0 4px 14px rgba(29,185,84,0.25);
        }
        .btn-full.no-track {
            background: linear-gradient(135deg, #4a4a4a 0%, #3a3a3a 100%);
            color: #b0b0b0;
            box-shadow: none;
        }
        .settings-btn {
            flex-shrink: 0;
            background: #23262e;
            font-size: 1.4rem;
            padding: 0 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #333842;
        }

        /* --- Sound grid --- */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-auto-rows: 1fr;
            gap: 8px;
            flex: 1 1 auto;
            min-height: 0;
        }
        .btn-grid {
            background: #23262e;
            border: 1px solid #333842;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-align: center;
            padding: 6px;
            font-size: clamp(0.85rem, 2.4vw, 1.15rem);
            min-height: 0;
            position: relative;
            overflow: hidden;
        }
        .btn-grid::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--accent, #555);
        }
        .btn-grid .emoji {
            font-size: clamp(1.3rem, 5vw, 2rem);
            line-height: 1;
        }
        .btn-grid.accent-green  { --accent: #1DB954; }
        .btn-grid.accent-red    { --accent: #e0455e; }
        .btn-grid.accent-blue   { --accent: #3b82f6; }
        .btn-grid.accent-amber  { --accent: #f59e0b; }
        .btn-grid.accent-purple { --accent: #a855f7; }
        .btn-grid.accent-orange { --accent: #fb7139; }

        /* --- Now playing --- */
        .now-playing {
            flex-shrink: 0;
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 62px;
            background: #1b2340;
            border: 1px solid #2a3a6b;
            transition: background 0.3s, border-color 0.3s;
        }
        .now-playing.playing {
            background: linear-gradient(135deg, #1e40af 0%, #2547c9 100%);
            border-color: #4f7cff;
        }
        .np-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #6b7db3;
            flex-shrink: 0;
        }
        .now-playing.playing .np-dot {
            background: #7dd3fc;
            box-shadow: 0 0 0 0 rgba(125,211,252,0.7);
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(125,211,252,0.6); }
            70%  { box-shadow: 0 0 0 10px rgba(125,211,252,0); }
            100% { box-shadow: 0 0 0 0 rgba(125,211,252,0); }
        }
        .np-text { min-width: 0; }
        .now-playing-label {
            font-size: 0.7rem;
            color: #9db0e0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .now-playing-track {
            font-size: clamp(0.95rem, 2.4vw, 1.15rem);
            color: white;
            font-weight: 600;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Stop --- */
        .btn-stop {
            flex-shrink: 0;
            background: linear-gradient(135deg, #e02424 0%, #b81c1c 100%);
            padding: 18px;
            font-size: clamp(1.2rem, 4vw, 1.7rem);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: clamp(58px, 9vh, 90px);
            box-shadow: 0 4px 14px rgba(224,36,36,0.3);
        }

        /* --- Login --- */
        .btn-login {
            background: linear-gradient(135deg, #1DB954 0%, #159a44 100%);
            padding: 20px;
            border-radius: 50px;
            width: 100%;
            font-size: 1.3rem;
        }

        /* --- Modals --- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: #16181f;
            width: 100%;
            max-width: 460px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
            border: 1px solid #2a2e38;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid #2a2e38;
        }
        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1DB954;
        }
        .modal-close {
            background: none;
            color: #aaa;
            font-size: 1.5rem;
            padding: 0;
            width: 32px;
            height: 32px;
        }
        .track-list {
            overflow-y: auto;
            padding: 12px;
        }
        .track-item {
            background: #20232c;
            border: 2px solid #2c313d;
            border-radius: 12px;
            padding: 15px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.15s;
        }
        .track-item:active {
            background: #1DB954;
            border-color: #1DB954;
            transform: scale(0.98);
        }
        .track-name { font-weight: 700; font-size: 1.05rem; }
        .track-uri {
            font-size: 0.8rem;
            color: #8a8f9c;
            font-family: monospace;
            word-break: break-all;
            margin-top: 4px;
        }
        .settings-body { padding: 20px; overflow-y: auto; }
        .settings-section { margin-bottom: 24px; }
        .settings-section h3 { margin: 0 0 6px 0; color: #1DB954; font-size: 1rem; }
        .settings-section p { margin: 0 0 12px 0; font-size: 0.85rem; color: #8a8f9c; }
        .settings-section input[type="file"],
        .settings-section input[type="text"] {
            width: 100%;
            padding: 11px;
            background: #20232c;
            border: 1px solid #2c313d;
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }
        .status-line { margin-top: 10px; font-size: 0.85rem; color: #8a8f9c; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="margin: auto; width: 85%; text-align: center;">
            <div id="connecting-msg" style="display: none; color: #9db0e0; font-size: 1.1rem; margin-bottom: 20px;">
                Connecting to Spotify…
            </div>
            <button class="btn-login" onclick="login()">Connect to Spotify</button>
            <div id="login-error" style="display: none; color: #ff8080; font-size: 0.9rem; margin-top: 16px;"></div>
        </div>
    </div>

    <div id="app-screen">
        <div class="pregame-row">
            <button class="btn-full" id="pregame-btn" onclick="playPregame()">
                <span>📣</span> Pregame Announcement
            </button>
            <button class="settings-btn" onclick="openSettings()">⚙️</button>
        </div>

        <div class="grid">
            <button class="btn-grid accent-purple" onclick="openTrackSelector('whistles', 'Between Whistles')">
                <span class="emoji">🎵</span>Between Whistles
            </button>
            <button class="btn-grid accent-green" onclick="openTrackSelector('goalFor', 'Goal FOR')">
                <span class="emoji">🚨</span>Goal FOR
            </button>
            <button class="btn-grid accent-red" onclick="openTrackSelector('goalAgainst', 'Goal AGAINST')">
                <span class="emoji">🥅</span>Goal AGAINST
            </button>
            <button class="btn-grid accent-blue" onclick="openTrackSelector('penaltyFor', 'Powerplay')">
                <span class="emoji">💪</span>Powerplay
            </button>
            <button class="btn-grid accent-amber" onclick="openTrackSelector('penaltyAgainst', 'Penalty Kill')">
                <span class="emoji">⚠️</span>Penalty Kill
            </button>
            <button class="btn-grid accent-orange" onclick="openTrackSelector('endGame', 'End Game Intensity')">
                <span class="emoji">🔥</span>End Game Intensity
            </button>
        </div>

        <div id="now-playing" class="now-playing">
            <div class="np-dot"></div>
            <div class="np-text">
                <div class="now-playing-label">Now Playing</div>
                <div id="now-playing-track" class="now-playing-track">Nothing</div>
            </div>
        </div>

        <button class="btn-stop" onclick="stopMusic()">🛑 Stop Music</button>
    </div>

    <div id="track-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="track-modal-title">Select Track</span>
                <button class="modal-close" onclick="closeTrackSelector()">✕</button>
            </div>
            <div id="track-list" class="track-list"></div>
        </div>
    </div>

    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">Settings</span>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>
            <div class="settings-body">
                <div class="settings-section">
                    <h3>Pregame Audio File</h3>
                    <p>Upload an audio file to play for the pregame announcement</p>
                    <input type="file" id="pregame-file-input" accept="audio/*" onchange="handlePregameFileSelect()">
                    <div id="pregame-file-status" class="status-line"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
         EDIT YOUR TRACKS HERE.
         Each category is a list of tracks. Each track is:
             { uri: 'spotify:track:XXXXX', name: 'Song Title' }
         Optionally add a start time (in seconds) so playback skips
         an intro:
             { uri: 'spotify:track:XXXXX', name: 'Song Title', startSec: 15 }
         Wrap every track in { }, put a COMMA after each track and
         after each field except the last one in it. This block is
         isolated on purpose: a typo here can't break the rest of the app.
         ============================================================ -->
    <script>
        window.TRACKS = {
            pregame: [
                { uri: 'spotify:track:0pqnGHJpmpxLKifKRmU6WP', name: 'Pregame Track' }
            ],
            whistles: [
                { uri: 'spotify:track:51c94ac31swyEAyWHyOtz', name: 'Whistles Track 1' },
                { uri: 'spotify:track:1Eolhana7nKGWwIGvmihxX', name: 'Whistles Track 2' }
            ],
            goalFor: [
                { uri: 'spotify:track:2d7LPtieXdIYZEvugvOjl1', name: 'Goal FOR Track' }
            ],
            goalAgainst: [
                { uri: 'spotify:track:3hB3sGhU2qJ1BEn9JjP2Hq', name: 'Goal AGAINST Track' }
            ],
            penaltyFor: [
                { uri: 'spotify:track:0ofHAoxe9vBkTCp2UQIavz', name: 'Penalty FOR Track' }
            ],
            penaltyAgainst: [
                { uri: 'spotify:track:0ofHAoxe9vBkTCp2UQIavz', name: 'Penalty AGAINST Track' }
            ],
            endGame: [
                { uri: 'spotify:track:0ofHAoxe9vBkTCp2UQIavz', name: 'End Game Track' }
            ]
        };
    </script>

    <script>
        // --- SAFETY NET: never allow a blank/black screen ---
        // If any unexpected error occurs, make sure the login screen is visible
        // and show a short message instead of leaving the user staring at black.
        window.onerror = function (message) {
            try {
                var login = document.getElementById('login-screen');
                var app = document.getElementById('app-screen');
                if (login) login.style.display = 'flex';
                if (app) app.style.display = 'none';
                var errEl = document.getElementById('login-error');
                if (errEl) {
                    errEl.style.display = 'block';
                    errEl.textContent = 'Something went wrong: ' + message;
                }
            } catch (e) {}
            return false;
        };

        // Storage that can never throw (some mobile/PWA contexts block localStorage)
        function lsGet(key) {
            try { return localStorage.getItem(key); } catch (e) { return null; }
        }
        function lsSet(key, value) {
            try { localStorage.setItem(key, value); return true; } catch (e) { return false; }
        }
        function lsRemove(key) {
            try { localStorage.removeItem(key); } catch (e) {}
        }

        // --- CONFIGURATION ---
        const CLIENT_ID = "15f455ebb98944a596f984be56766ac0"; // Paste your Client ID here
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        let accessToken = lsGet('spotify_access_token');

        // Track lists live in their own <script> block above. If that block
        // has a typo (e.g. a missing comma), only the track lists are lost —
        // the app itself keeps working and shows a warning when you open one.
        const tracks = window.TRACKS || {};

        // --- PKCE AUTHENTICATION LOGIC ---
        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        }

        async function sha256(plain) {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        }

        function base64encode(input) {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '')
                .replace(/\+/g, '-')
                .replace(/\//g, '_');
        }

        async function login() {
            const codeVerifier = generateRandomString(64);
            lsSet('code_verifier', codeVerifier);
            const hashed = await sha256(codeVerifier);
            const codeChallenge = base64encode(hashed);

            const scope = 'user-modify-playback-state user-read-playback-state';
            const authUrl = new URL("https://accounts.spotify.com/authorize");

            const params = {
                response_type: 'code',
                client_id: CLIENT_ID,
                scope: scope,
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
                redirect_uri: REDIRECT_URI,
            };

            authUrl.search = new URLSearchParams(params).toString();
            window.location.href = authUrl.toString();
        }

        function showLogin(errorMessage) {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('connecting-msg').style.display = 'none';
            document.getElementById('login-error').style.display = errorMessage ? 'block' : 'none';
            document.getElementById('login-error').textContent = errorMessage || '';
        }

        function showConnecting() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('connecting-msg').style.display = 'block';
            document.getElementById('login-error').style.display = 'none';
        }

        async function getToken(code) {
            const codeVerifier = lsGet('code_verifier');

            // Clean the code out of the URL immediately so a refresh can't reuse it
            window.history.replaceState({}, document.title, window.location.pathname);

            if (!codeVerifier) {
                showLogin("Session expired during login. Please tap Connect again.");
                return;
            }

            const payload = {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    client_id: CLIENT_ID,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    code_verifier: codeVerifier,
                })
            };

            try {
                const body = await fetch("https://accounts.spotify.com/api/token", payload);
                const response = await body.json();

                if (response.access_token) {
                    lsSet('spotify_access_token', response.access_token);
                    accessToken = response.access_token;
                    showApp();
                } else {
                    showLogin("Login failed" + (response.error_description ? ": " + response.error_description : "") + ". Check your Spotify redirect URI.");
                }
            } catch (err) {
                console.error("Token fetch error:", err);
                showLogin("Couldn't reach Spotify. Check your connection and try again.");
            }
        }

        function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');

            if (error) {
                window.history.replaceState({}, document.title, window.location.pathname);
                showLogin("Spotify sign-in was cancelled or denied.");
            } else if (code) {
                showConnecting();
                getToken(code);
            } else if (accessToken) {
                showApp();
            } else {
                showLogin();
            }
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
        }

        // --- SETTINGS ---
        let pregameAudioData = lsGet('pregame_audio_data');
        let pregameFileName = lsGet('pregame_file_name');

        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
            updatePregameFileStatus();
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function handlePregameFileSelect() {
            const file = document.getElementById('pregame-file-input').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    pregameAudioData = e.target.result;
                    pregameFileName = file.name;
                    lsSet('pregame_audio_data', pregameAudioData);
                    lsSet('pregame_file_name', pregameFileName);
                    updatePregameFileStatus();
                } catch (err) {
                    alert('File too large for storage. Try a smaller audio file.');
                    console.error('Storage error:', err);
                }
            };
            reader.readAsDataURL(file);
        }

        function updatePregameFileStatus() {
            const statusDiv = document.getElementById('pregame-file-status');
            const pregameBtn = document.getElementById('pregame-btn');

            if (pregameFileName) {
                statusDiv.textContent = `✓ Loaded: ${pregameFileName}`;
                statusDiv.style.color = '#1DB954';
                pregameBtn.classList.remove('no-track');
            } else {
                statusDiv.textContent = 'No file selected - will use Spotify';
                statusDiv.style.color = '#8a8f9c';
                pregameBtn.classList.add('no-track');
            }
        }

        // --- TRACK SELECTOR MODAL ---
        let currentCategory = null;

        function openTrackSelector(category, label) {
            if (!accessToken) return alert("Please log in first!");
            currentCategory = category;
            document.getElementById('track-modal-title').textContent = label;

            const trackList = document.getElementById('track-list');
            trackList.innerHTML = '';

            const categoryTracks = tracks[category] || [];
            if (categoryTracks.length === 0) {
                const note = document.createElement('div');
                note.style.cssText = 'padding:20px;color:#8a8f9c;text-align:center;';
                note.textContent = window.TRACKS
                    ? 'No tracks set up for this button yet. Add Spotify URIs to this category in index.html.'
                    : 'Track list failed to load — check index.html for a typo (usually a missing comma or quote) in the TRACKS block.';
                trackList.appendChild(note);
            }
            categoryTracks.forEach((track, index) => {
                const uri = typeof track === 'string' ? track : track.uri;
                const name = typeof track === 'string' ? `Track ${index + 1}` : (track.name || `Track ${index + 1}`);
                const startSec = typeof track === 'object' ? track.startSec : undefined;
                const startMs = (typeof startSec === 'number' && startSec > 0) ? Math.round(startSec * 1000) : 0;

                const item = document.createElement('div');
                item.className = 'track-item';

                const nameEl = document.createElement('div');
                nameEl.className = 'track-name';
                nameEl.textContent = name;
                item.appendChild(nameEl);

                if (startMs > 0) {
                    const startEl = document.createElement('div');
                    startEl.className = 'track-uri';
                    startEl.textContent = `Starts at ${startSec}s`;
                    item.appendChild(startEl);
                }

                item.onclick = () => playTrack(uri, name, startMs);
                trackList.appendChild(item);
            });

            document.getElementById('track-modal').style.display = 'flex';
        }

        function closeTrackSelector() {
            document.getElementById('track-modal').style.display = 'none';
            currentCategory = null;
        }

        // --- PREGAME AUDIO ---
        let pregameAudioElement = null;

        function playPregame() {
            if (!accessToken) return alert("Please log in first!");

            if (pregameAudioData) {
                playPregameAudio();
            } else {
                openTrackSelector('pregame', 'Pregame Announcement');
            }
        }

        function playPregameAudio() {
            if (!pregameAudioElement) {
                pregameAudioElement = new Audio();
            }

            pregameAudioElement.src = pregameAudioData;
            pregameAudioElement.play().catch(err => {
                console.error('Error playing pregame audio:', err);
                alert('Error playing audio file');
            });

            updateNowPlaying(pregameFileName || 'Pregame Announcement');
        }

        // --- PLAYBACK CONTROLS ---
        async function playTrack(uri, trackName, startMs) {
            if (!accessToken) return alert("Please log in first!");

            try {
                const body = { uris: [uri] };
                if (startMs > 0) body.position_ms = startMs;

                const response = await fetch('https://api.spotify.com/v1/me/player/play', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (response.status === 404) {
                    alert("No active Spotify device found. Open Spotify on your phone and press play once to activate it.");
                } else if (response.status === 401) {
                    lsRemove('spotify_access_token');
                    accessToken = null;
                    checkAuth();
                } else {
                    updateNowPlaying(trackName);
                    closeTrackSelector();
                }
            } catch (error) {
                console.error("Error playing track:", error);
            }
        }

        function updateNowPlaying(trackName) {
            const nowPlaying = document.getElementById('now-playing');
            document.getElementById('now-playing-track').textContent = trackName;
            nowPlaying.classList.add('playing');
        }

        async function stopMusic() {
            // Stop local pregame audio if playing
            if (pregameAudioElement) {
                pregameAudioElement.pause();
                pregameAudioElement.currentTime = 0;
            }

            const nowPlaying = document.getElementById('now-playing');
            document.getElementById('now-playing-track').textContent = 'Nothing';
            nowPlaying.classList.remove('playing');

            if (!accessToken) return;

            try {
                await fetch('https://api.spotify.com/v1/me/player/pause', {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
            } catch (error) {
                console.error("Error pausing track:", error);
            }
        }

        // --- Initialize ---
        try {
            updatePregameFileStatus();
            checkAuth();
        } catch (err) {
            console.error("Init error:", err);
            showLogin("Something went wrong loading the app. Please refresh.");
        }
    </script>
</body>
</html>
