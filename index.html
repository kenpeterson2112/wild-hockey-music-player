<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Soundboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        #login-screen, #app-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .header {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
            font-weight: bold;
            color: #1DB954;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex-grow: 1;
        }
        button {
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.96);
            opacity: 0.8;
        }
        .btn-full {
            grid-column: span 2;
            background-color: #1DB954;
            padding: 25px;
            margin-bottom: 12px;
        }
        .btn-grid {
            background-color: #333;
            padding: 20px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .btn-stop {
            grid-column: span 2;
            background-color: #e02424;
            padding: 35px;
            font-size: 1.8rem;
            margin-top: 15px;
            text-transform: uppercase;
        }
        .btn-login {
            background-color: #1DB954;
            padding: 20px;
            margin: auto;
            border-radius: 50px;
            width: 80%;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <button class="btn-login" onclick="login()">Connect to Spotify</button>
    </div>

    <div id="app-screen">
        <div class="header">Game Soundboard</div>
        
        <button class="btn-full" onclick="playRandomTrack('pregame')">
            Pregame Announcement
        </button>

        <div class="grid">
            <button class="btn-grid" onclick="playRandomTrack('whistles')">Between Whistles</button>
            <button class="btn-grid" onclick="playRandomTrack('goalFor')">Goal FOR</button>
            
            <button class="btn-grid" onclick="playRandomTrack('goalAgainst')">Goal AGAINST</button>
            <button class="btn-grid" onclick="playRandomTrack('penaltyFor')">Penalty FOR</button>
            
            <button class="btn-grid" onclick="playRandomTrack('penaltyAgainst')">Penalty AGAINST</button>
            <button class="btn-grid" onclick="playRandomTrack('endGame')">End Game Intensity</button>
        </div>

        <button class="btn-stop" onclick="stopMusic()">🛑 STOP MUSIC</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CLIENT_ID = 'YOUR_CLIENT_ID_HERE'; // Paste your Client ID here
        const REDIRECT_URI = window.location.origin + window.location.pathname; 
        
        let accessToken = localStorage.getItem('spotify_access_token');

        // --- TRACK ARRAYS ---
        const tracks = {
            pregame: [
                'spotify:track:0tZ3mElWcr74OOhKEiNj8V', 
                'spotify:track:3cuNcsSWeYJ1LwI22z6QnS'  
            ],
            whistles: [
                'spotify:track:51c94ac31swyEAyWHyOtz',  
                'spotify:track:1Eolhana7nKGWwIGvmihxX'  
            ],
            goalFor: [
                'spotify:track:2d7LPtieXdIYZEvugvOjl1'  
            ],
            goalAgainst: [
                'spotify:track:3hB3sGhU2qJ1BEn9JjP2Hq'  
            ],
            penaltyFor: [
                'spotify:track:0ofHAoxe9vBkTCp2UQIavz'  
            ],
            penaltyAgainst: [
                'spotify:track:0ofHAoxe9vBkTCp2UQIavz'  
            ],
            endGame: [
                'spotify:track:0ofHAoxe9vBkTCp2UQIavz'  
            ]
        };

        // --- PKCE AUTHENTICATION LOGIC ---
        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        }

        async function sha256(plain) {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        }

        function base64encode(input) {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '')
                .replace(/\+/g, '-')
                .replace(/\//g, '_');
        }

        async function login() {
            const codeVerifier = generateRandomString(64);
            window.localStorage.setItem('code_verifier', codeVerifier);
            const hashed = await sha256(codeVerifier);
            const codeChallenge = base64encode(hashed);

            const scope = 'user-modify-playback-state user-read-playback-state';
            const authUrl = new URL("https://accounts.spotify.com/authorize");
            
            const params = {
                response_type: 'code',
                client_id: CLIENT_ID,
                scope: scope,
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
                redirect_uri: REDIRECT_URI,
            };

            authUrl.search = new URLSearchParams(params).toString();
            window.location.href = authUrl.toString();
        }

        async function getToken(code) {
            const codeVerifier = localStorage.getItem('code_verifier');
            
            const payload = {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    client_id: CLIENT_ID,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    code_verifier: codeVerifier,
                })
            };

            try {
                const body = await fetch("https://accounts.spotify.com/api/token", payload);
                const response = await body.json();

                if (response.access_token) {
                    localStorage.setItem('spotify_access_token', response.access_token);
                    accessToken = response.access_token;
                    window.history.replaceState({}, document.title, window.location.pathname);
                    showApp();
                } else {
                    alert("Authentication failed. Check your client ID and redirect URIs.");
                }
            } catch (err) {
                console.error("Token fetch error:", err);
            }
        }

        function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                // If returning from Spotify with a code, swap it for a token
                getToken(code);
            } else if (accessToken) {
                // If we already have a saved token
                showApp();
            } else {
                // First time load
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
        }

        // --- PLAYBACK CONTROLS ---
        async function playRandomTrack(category) {
            if (!accessToken) return alert("Please log in first!");

            const categoryTracks = tracks[category];
            if (!categoryTracks || categoryTracks.length === 0) return;

            const randomUri = categoryTracks[Math.floor(Math.random() * categoryTracks.length)];

            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/play', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ uris: [randomUri] })
                });

                if (response.status === 404) {
                    alert("No active Spotify device found. Open Spotify on your phone and press play once to activate it.");
                } else if (response.status === 401) {
                    // Token expired
                    localStorage.removeItem('spotify_access_token');
                    accessToken = null;
                    checkAuth();
                }
            } catch (error) {
                console.error("Error playing track:", error);
            }
        }

        async function stopMusic() {
            if (!accessToken) return;
            
            try {
                await fetch('https://api.spotify.com/v1/me/player/pause', {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
            } catch (error) {
                console.error("Error pausing track:", error);
            }
        }

        // Initialize
        checkAuth();
    </script>
</body>
</html>
